<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FugaBridge | Validator Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <span class="emoji">🦞</span>
                <h1>FugaBridge Dashboard</h1>
            </div>
            <div class="status-badge" id="bridge-balance">Bridge Balance: Loading...</div>
        </header>

        <main>
            <section class="overview">
                <div class="card">
                    <h3>Total Evaluations</h3>
                    <p id="total-evals" class="big-number">0</p>
                </div>
                <div class="card">
                    <h3>Network</h3>
                    <p class="big-text">Arbitrum Sepolia</p>
                </div>
            </section>

            <section class="charts">
                <div class="card ranking-card">
                    <h2>Miner Performance Ranking</h2>
                    <div id="ranking-list" class="ranking-list">
                        <!-- Ranking items will be injected here -->
                    </div>
                </div>
            </section>

            <section class="history">
                <div class="card history-card">
                    <h2>Recent RLHF Evaluations</h2>
                    <table id="history-table">
                        <thead>
                            <tr>
                                <th>Timestamp</th>
                                <th>Prompt</th>
                                <th>Choice</th>
                                <th>TX Hash</th>
                                <th>Reward</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- History rows will be injected here -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 FugaBridge | Bittensor Subnet Ideathon Round 2</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
